<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>KundFlow AI - Automation Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 15px 0;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  font-weight: bold;
  cursor: pointer;
  border-radius: 8px;
}

.small {
  font-size: 13px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ KundFlow AI Automation Hub</h1>

<div class="card">
<h2>1. Snabb outreach message</h2>

<textarea id="msg">Hej! Jag hjälper företag i er bransch få fler kunder online genom AI och marknadsföring. Vill ni ha en gratis analys?</textarea>

<button onclick="copyMsg()">Kopiera meddelande</button>
</div>

<div class="card">
<h2>2. Lead tracker (manuell CRM)</h2>

<input id="company" placeholder="Företagsnamn">
<input id="contact" placeholder="Email / Telefon">

<button onclick="saveLead()">Spara lead</button>

<div id="leads"></div>
</div>

<div class="card">
<h2>3. Snabb Google search generator</h2>

<input id="city" placeholder="Stad">
<input id="niche" placeholder="Nisch">

<button onclick="search()">Generera leads</button>

<div id="results"></div>
</div>

</div>

<script>
function copyMsg() {
  let text = document.getElementById("msg").value;
  navigator.clipboard.writeText(text);
  alert("Kopierat!");
}

function saveLead() {
  let c = document.getElementById("company").value;
  let e = document.getElementById("contact").value;

  let div = document.createElement("div");
  div.className = "card";
  div.innerHTML = "<b>" + c + "</b><br>" + e;

  document.getElementById("leads").appendChild(div);
}

function search() {
  let city = document.getElementById("city").value;
  let niche = document.getElementById("niche").value;

  let q = niche + " " + city;
  let url = "https://www.google.com/search?q=" + encodeURIComponent(q);

  document.getElementById("results").innerHTML = `
    <div class="card">
      <p>${q}</p>
      <a href="${url}" target="_blank">Öppna leads</a>
    </div>
  `;
}
</script>

</body>
</html>
